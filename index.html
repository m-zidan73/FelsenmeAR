<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>AR Island Prototype - Web</title>
    <link rel="stylesheet" href="src/styles.css?v=main-menu-2">
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="src/app.js?v=main-menu-2"></script>
  </head>
  <body>
    <main id="app">
      <section id="mainMenu" class="main-menu" aria-live="polite">
        <div class="main-menu-content">
          <img class="brand-logo" src="Assets/Photos/UI%20-%20Main%20Menu/Logo.png" alt="FelsenmeAR">
          <div class="ready-card">
            <div class="loading-row">
              <div class="loading-track" aria-hidden="true">
                <span id="loadingFill"></span>
              </div>
              <span id="loadingStateLabel">Checking</span>
            </div>
            <p id="statusText">Checking AR capability.</p>
          </div>
          <nav class="main-menu-actions" aria-label="Main menu">
            <button id="startArButton" class="primary-menu-action" type="button">Start</button>
            <button type="button" disabled>Continue</button>
            <button id="resetButton" type="button">Restart</button>
            <button type="button" disabled>Options</button>
            <button type="button" disabled>Credits</button>
          </nav>
        </div>
      </section>
      <section id="overlay" class="ar-overlay" aria-live="polite">
        <button id="menuButton" class="menu-button" type="button" hidden aria-label="Return to main menu">
          <img src="Assets/Sprites/Main%20Menu%20Icon.png" alt="">
        </button>
        <div class="placement-controls">
          <p id="scanPrompt" class="scan-prompt" hidden>Please face the camera on top of a flat surface</p>
          <button id="startFromHereButton" class="start-from-here" type="button" hidden>Start From Here</button>
        </div>
        <div class="bottom-ui" hidden>
          <section id="formationSlider" class="formation-slider" aria-label="Rock formation timeline">
            <ol class="formation-stages" aria-hidden="true">
              <li class="formation-stage">
                <img src="Assets/Sprites/Magma.png" alt="">
              </li>
              <li class="formation-stage">
                <img src="Assets/Sprites/Solid%20Quartz%20Diorite.png" alt="">
              </li>
              <li class="formation-stage">
                <img src="Assets/Sprites/Cracked%20Slab%20of%20Diorite.png" alt="">
              </li>
              <li class="formation-stage">
                <img src="Assets/Sprites/Rounded%20Boulders.png" alt="">
              </li>
              <li class="formation-stage is-active">
                <img src="Assets/Sprites/Final%20Boulder.png" alt="">
              </li>
            </ol>
            <div class="formation-track-wrap">
              <input id="formationRange" class="formation-range" type="range" min="0" max="4" step="0.001" value="4" aria-label="Rock formation step">
              <div class="formation-track" aria-hidden="true">
                <span class="formation-fill"></span>
                <span class="formation-dot"></span>
                <span class="formation-dot"></span>
                <span class="formation-dot"></span>
                <span class="formation-dot"></span>
                <span class="formation-dot is-active"></span>
              </div>
            </div>
          </section>
        </div>
        <div class="telemetry" hidden>
          <span id="heightValue">0.00</span>
          <span id="separationValue">0.00</span>
          <span id="xrDebugText">XR: checking support</span>
          <div id="geoStatus">
            <strong id="geoDistanceValue">waiting</strong>
            <strong id="geoHeadingValue">waiting</strong>
            <strong id="geoGateValue">locked</strong>
          </div>
        </div>
      </section>
      <div id="canvasRoot" aria-hidden="true"></div>
    </main>
  </body>
</html>
