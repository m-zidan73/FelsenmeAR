<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>AR Island Prototype - Web</title>
    <link rel="stylesheet" href="src/styles.css?v=object3-slider-1">
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="src/app.js?v=object3-slider-1"></script>
  </head>
  <body>
    <main id="app">
      <section id="overlay" aria-live="polite">
        <div class="status-card">
          <p class="eyebrow">Web port</p>
          <h1>AR Island Prototype</h1>
          <p id="statusText">Enter AR, scan for a surface, then tap the detected plane.</p>
          <dl>
            <div>
              <dt>Height</dt>
              <dd><span id="heightValue">0.00</span> m</dd>
            </div>
            <div>
              <dt>Separation</dt>
              <dd><span id="separationValue">1.20</span> m</dd>
            </div>
          </dl>
          <p id="xrDebugText" class="debug-line">XR: checking support</p>
          <div id="geoStatus" class="geo-status">
            <div>
              <span>Distance</span>
              <strong id="geoDistanceValue">waiting</strong>
            </div>
            <div>
              <span>Heading</span>
              <strong id="geoHeadingValue">waiting</strong>
            </div>
            <div>
              <span>Gate</span>
              <strong id="geoGateValue">locked</strong>
            </div>
          </div>
        </div>
        <div class="bottom-ui">
          <section id="formationSlider" class="formation-slider" aria-label="Rock formation timeline">
            <ol class="formation-stages" aria-hidden="true">
              <li class="formation-stage is-active">
                <img src="Assets/Sprites/Magma.png" alt="">
              </li>
              <li class="formation-stage">
                <img src="Assets/Sprites/Solid%20Quartz%20Diorite.png" alt="">
              </li>
              <li class="formation-stage">
                <img src="Assets/Sprites/Cracked%20Slab%20of%20Diorite.png" alt="">
              </li>
              <li class="formation-stage">
                <img src="Assets/Sprites/Rounded%20Boulders.png" alt="">
              </li>
              <li class="formation-stage">
                <img src="Assets/Sprites/Final%20Boulder.png" alt="">
              </li>
            </ol>
            <div class="formation-track-wrap">
              <input id="formationRange" class="formation-range" type="range" min="0" max="4" step="0.001" value="0" aria-label="Rock formation step">
              <div class="formation-track" aria-hidden="true">
                <span class="formation-fill"></span>
                <span class="formation-dot is-active"></span>
                <span class="formation-dot"></span>
                <span class="formation-dot"></span>
                <span class="formation-dot"></span>
                <span class="formation-dot"></span>
              </div>
            </div>
          </section>
          <div class="control-row">
            <button id="startArButton" type="button">Start Camera AR</button>
            <button id="resetButton" type="button">Reset</button>
          </div>
        </div>
      </section>
      <div id="canvasRoot" aria-hidden="true"></div>
    </main>
  </body>
</html>
